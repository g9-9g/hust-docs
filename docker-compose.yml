services:
  mongo:
    image: mongo:7.0
    container_name: hust-docs-mongo
    restart: unless-stopped
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all"]
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
      - mongo-config:/data/configdb
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  mongo-init:
    image: mongo:7.0
    container_name: hust-docs-mongo-init
    depends_on:
      mongo:
        condition: service_healthy
    restart: "no"
    entrypoint:
      - bash
      - -c
      - |
        mongosh --host mongo:27017 --quiet --eval '
          try {
            const s = rs.status();
            print("[init] replica set already up:", s.set);
          } catch (e) {
            print("[init] initiating rs0 ...");
            rs.initiate({
              _id: "rs0",
              members: [{ _id: 0, host: "127.0.0.1:27017" }]
            });
          }
        '

volumes:
  mongo-data:
  mongo-config:
